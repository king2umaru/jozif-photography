<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo grid</title>
    <style>
      body {
        margin: 0;
        background: #0d0d0d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .photo-grid-wrapper {
        width: 100%;
      }

      /* Instagram-style: 3 columns, square tiles, tiny gap, no rounded corners */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
        max-width: 935px;
        margin: 0 auto;
      }

      @media (min-width: 600px) {
        .photo-grid {
          gap: 28px;
        }
      }

      .photo-grid-item {
        position: relative;
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        border: none;
        padding: 0;
        margin: 0;
        background: #1a1a1a;
        overflow: hidden;
        cursor: pointer;
      }

      .photo-grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .photo-grid-item:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }

      /* Full-screen viewer */
      .photo-viewer {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .photo-viewer.open {
        display: flex;
        animation: photo-viewer-fade-in 0.2s ease;
      }

      @keyframes photo-viewer-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .photo-viewer-image {
        max-width: 92vw;
        max-height: 92vh;
        object-fit: contain;
        border-radius: 4px;
      }

      .photo-viewer-close,
      .photo-viewer-nav {
        position: absolute;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .photo-viewer-close:hover,
      .photo-viewer-nav:hover {
        background: rgba(255, 255, 255, 0.22);
      }

      .photo-viewer-close {
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
        font-size: 28px;
      }

      .photo-viewer-nav {
        top: 50%;
        transform: translateY(-50%);
        width: 48px;
        height: 48px;
        font-size: 32px;
      }

      .photo-viewer-prev {
        left: 16px;
      }
      .photo-viewer-next {
        right: 16px;
      }

      @media (max-width: 600px) {
        .photo-viewer-nav {
          width: 40px;
          height: 40px;
          font-size: 26px;
        }
      }

      .multi-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        color: #fff;
        font-size: 16px;
        text-shadow: 0 0 3px rgba(0, 0, 0, 0.6);
      }

      .viewer-dots {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
      }

      .viewer-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
      }

      .viewer-dot.active {
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="photo-grid-wrapper">
      <div class="photo-grid" id="photoGrid"></div>
    </div>

    <div class="photo-viewer" id="photoViewer" role="dialog" aria-modal="true">
      <button class="photo-viewer-close" id="closeBtn" aria-label="Close">
        &times;
      </button>
      <button
        class="photo-viewer-nav photo-viewer-prev"
        id="prevBtn"
        aria-label="Previous photo"
      >
        &#8249;
      </button>
      <img class="photo-viewer-image" id="viewerImage" src="" alt="" />
      <button
        class="photo-viewer-nav photo-viewer-next"
        id="nextBtn"
        aria-label="Next photo"
      >
        &#8250;
      </button>
      <div class="viewer-dots" id="viewerDots"></div>
    </div>

    <script>
      // Each "post" can have one image, or several (like an Instagram carousel post)
      const posts = [
        {
          images: [
            {
              src: "wedding-images/wedding-frame-one.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-one2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-one3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-one4.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-one5.jpg",
              alt: "Forest road",
            },
            {
              src: "wedding-images/wedding-frame-one6.jpg",
              alt: "Forest road",
            },
          ],
        },
        {
          images: [
            {
              src: "wedding-images/wedding-frame-two1.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-two2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-two3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-two4.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-two5.jpg",
              alt: "Forest road",
            },
          ],
        },
        {
          images: [
            {
              src: "wedding-images/wedding-frame-three1.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-three2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-three3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-three4.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-three5.jpg",
              alt: "Forest road",
            },
          ],
        },
        {
          images: [
            {
              src: "wedding-images/wedding-frame-four1.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-four2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-four3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-four4.jpg",
              alt: "Canyon view",
            },
          ],
        },
        {
          images: [
            {
              src: "wedding-images/wedding-frame-five1.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-five2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-five3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-five4.jpg",
              alt: "Canyon view",
            },
          ],
        },
        {
          images: [
            {
              src: "wedding-images/wedding-frame-six1.jpg",
              alt: "Mountain river",
            },
            {
              src: "wedding-images/wedding-frame-six2.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-six3.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-six4.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-six5.jpg",
              alt: "Canyon view",
            },
            {
              src: "wedding-images/wedding-frame-six6.jpg",
              alt: "Canyon view",
            },
          ],
        },
      ];

      const grid = document.getElementById("photoGrid");
      const viewer = document.getElementById("photoViewer");
      const viewerImage = document.getElementById("viewerImage");
      const closeBtn = document.getElementById("closeBtn");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const dotsWrap = document.getElementById("viewerDots");

      let activePost = null;
      let activeImage = 0;

      function renderGrid() {
        posts.forEach((post, index) => {
          const btn = document.createElement("button");
          btn.className = "photo-grid-item";
          const cover = post.images[0];
          btn.setAttribute(
            "aria-label",
            "Open " + (cover.alt || "post") + " full screen",
          );

          const img = document.createElement("img");
          img.src = cover.src;
          img.alt = cover.alt || "";
          img.loading = "lazy";
          btn.appendChild(img);

          if (post.images.length > 1) {
            const badge = document.createElement("span");
            badge.className = "multi-badge";
            badge.innerHTML = "&#10697;";
            badge.setAttribute("aria-hidden", "true");
            btn.appendChild(badge);
          }

          btn.addEventListener("click", () => openViewer(index));
          grid.appendChild(btn);
        });
      }

      function renderDots() {
        dotsWrap.innerHTML = "";
        const count = posts[activePost].images.length;
        if (count <= 1) return;
        for (let i = 0; i < count; i++) {
          const dot = document.createElement("span");
          dot.className = "viewer-dot" + (i === activeImage ? " active" : "");
          dotsWrap.appendChild(dot);
        }
      }

      function updateViewerImage() {
        const img = posts[activePost].images[activeImage];
        viewerImage.src = img.src;
        viewerImage.alt = img.alt || "";
        renderDots();
      }

      function openViewer(postIndex) {
        activePost = postIndex;
        activeImage = 0;
        updateViewerImage();
        viewer.classList.add("open");
        document.body.style.overflow = "hidden";

        const hasMultiple = posts[activePost].images.length > 1;
        prevBtn.style.display = hasMultiple ? "flex" : "none";
        nextBtn.style.display = hasMultiple ? "flex" : "none";
      }

      function closeViewer() {
        viewer.classList.remove("open");
        document.body.style.overflow = "";
        activePost = null;
      }

      function showNext() {
        const count = posts[activePost].images.length;
        activeImage = (activeImage + 1) % count;
        updateViewerImage();
      }

      function showPrev() {
        const count = posts[activePost].images.length;
        activeImage = (activeImage - 1 + count) % count;
        updateViewerImage();
      }

      closeBtn.addEventListener("click", closeViewer);
      nextBtn.addEventListener("click", showNext);
      prevBtn.addEventListener("click", showPrev);

      // Close when clicking the backdrop, not the image
      viewer.addEventListener("click", (e) => {
        if (e.target === viewer) closeViewer();
      });

      document.addEventListener("keydown", (e) => {
        if (!viewer.classList.contains("open")) return;
        if (e.key === "Escape") closeViewer();
        if (e.key === "ArrowRight") showNext();
        if (e.key === "ArrowLeft") showPrev();
      });

      renderGrid();
    </script>
  </body>
</html>
